<!DOCTYPE html>
<html lang="en">
<head>
    <title>ExterNote</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">ExterNote</div>
        <div class="account">
            <div class="dropdown">
                <a href="#">Theme</a>
                <a href="#">Login</a>
            </div>
        </div>
    </nav>

    <!-- Notes Display -->
     <div class="noteLists" id="noteLists">
        <!-- <div class=" note">
        </div> -->
    </div>
    <!-- Add Button -->
    <button id="add" class="add-button">+</button>
    <!-- Adding a note -->
    <form id="noteForm" class="hidden">
        <h2>Add New Note</h2>
        <input type="text" id="noteTitle" name="title" placeholder="New Note" required>
        <textarea id="noteContent" name="content" placeholder="Note" required></textarea>
        <div class="buttons">
            <button type="submit" id="submitNote">Add</button>    
            <button type="button" id="cancelNote">Cancel</button>
        </div>
    </form>

</body>
</html>
